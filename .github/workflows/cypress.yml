name: Cypress E2E

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  e2e:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    env:
      CI: true

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: buenos_cakes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: buenos_cakes_web

      - name: Checkout API repository
        uses: actions/checkout@v4
        with:
          repository: GuilhermeBuenoReis/buenos_cakes_api
          path: buenos_cakes_api

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: buenos_cakes_web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: buenos_cakes_web

      - name: Install API dependencies
        run: pnpm install --frozen-lockfile
        working-directory: buenos_cakes_api

      - name: Run database migrations
        run: pnpm exec drizzle-kit migrate
        working-directory: buenos_cakes_api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/buenos_cakes_test

      - name: Start API server
        run: node_modules/.bin/tsx src/infra/http/server.ts &
        working-directory: buenos_cakes_api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/buenos_cakes_test
          NODE_ENV: development

      - name: Start web server
        run: NEXT_DIST_DIR=.next-e2e pnpm exec next dev --hostname localhost --port 3101 &
        working-directory: buenos_cakes_web

      - name: Wait for servers
        run: npx wait-on http://localhost:3333/health http://localhost:3101 --timeout 120000
        working-directory: buenos_cakes_web

      - name: Run Cypress tests
        run: pnpm exec cypress run
        working-directory: buenos_cakes_web

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: buenos_cakes_web/cypress/screenshots/
          retention-days: 7
